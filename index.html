<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Picks Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --gain: #22c55e; --loss: #ef4444; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 800px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1, h2 { color: var(--accent); margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
        th { text-transform: uppercase; font-size: 0.75rem; opacity: 0.7; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; margin-bottom: 2px; }
        .gain { color: var(--gain); font-weight: bold; }
        .loss { color: var(--loss); font-weight: bold; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .status-active { background: #1e40af; }
        .status-hit { background: #166534; }
        .status-stop { background: #991b1b; }
        .badge { background: var(--accent); color: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        
        #latest-picks { display: flex; flex-direction: column; gap: 15px; }
        .pick-card { border: 1px solid #334155; padding: 15px; border-radius: 8px; position: relative; }
        .pick-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 8px; }
        .ticker-link { font-weight:bold; font-size:1.2rem; color:var(--accent); text-decoration: none; }
        .rr-badge { font-size: 0.75rem; background: #334155; padding: 2px 6px; border-radius: 4px; opacity: 0.9; }
        .pick-stats { display: flex; justify-content: space-between; font-size: 0.75rem; gap: 5px; }
        .pick-stats > div { text-align: center; flex: 1; }
        .pick-reason { font-size: 0.8rem; margin-top: 8px; padding: 8px; background: #0f172a; border-radius: 6px; font-style: italic; opacity: 0.8; line-height: 1.3; }
        
        /* Expandable Chart Section */
        .expand-btn { width: 100%; background: #334155; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin-top: 10px; }
        #performance-view { display: none; margin-top: 20px; }
        canvas { max-width: 100%; height: auto !important; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Stock Picks Monitor</h1>
    
    <div class="card">
        <h2>Latest Top Picks</h2>
        <div id="latest-picks">Loading...</div>
    </div>

    <div class="card">
        <h2>Performance Audit Ledger</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Tkr</th>
                        <th>Stat</th>
                        <th>P/L</th>
                    </tr>
                </thead>
                <tbody id="audit-table">
                    <tr><td colspan="4">Loading audit data...</td></tr>
                </tbody>
            </table>
        </div>
        <button class="expand-btn" onclick="togglePerformance()">View Performance Charts 📊</button>
        <div id="performance-view">
            <canvas id="performanceChart"></canvas>
        </div>
    </div>

    <script>
        let performanceChart = null;

        function togglePerformance() {
            const view = document.getElementById('performance-view');
            const isHidden = window.getComputedStyle(view).display === 'none';
            view.style.display = isHidden ? 'block' : 'none';
            if (isHidden) renderCharts();
        }

        async function loadData() {
            try {
                const res = await fetch('audit_results.json?t=' + Date.now());
                const data = await res.json();
                window.auditData = data.audit;

                // Load High-Density Picks
                const picksHtml = data.latest_picks.map(p => `
                    <div class="pick-card">
                        <div class="pick-header">
                            <a href="https://www.tradingview.com/symbols/${p.Ticker}" target="_blank" class="ticker-link">${p.Ticker}</a>
                            <span class="rr-badge">RR: ${p.RR}</span>
                            <span class="badge">${p.Horizon}</span>
                        </div>
                        <div class="pick-stats">
                            <div><div class="stat-label">Entry</div>$${p.Entry}</div>
                            <div><div class="stat-label" style="color:var(--gain);">Target</div>$${p.TP}</div>
                            <div><div class="stat-label" style="color:var(--loss);">Stop</div>$${p.SL}</div>
                            <div><div class="stat-label">Size</div>${p.Size}</div>
                        </div>
                        <div class="pick-reason">${p.Reason}</div>
                    </div>
                `).join('');
                document.getElementById('latest-picks').innerHTML = picksHtml;

                // Load Audit Table
                const tableHtml = data.audit.map(r => `
                    <tr>
                        <td>${r["Trade Date"].slice(5)}</td>
                        <td style="font-weight:bold;">${r.Ticker}</td>
                        <td><span class="status-tag ${r.Status.includes('HIT') ? 'status-hit' : r.Status.includes('STOP') ? 'status-stop' : 'status-active'}" style="font-size:0.6rem;">${r.Status.split(' ')[0]}</span></td>
                        <td class="${r["Current P/L"].startsWith('-') ? 'loss' : 'gain'}">${r["Current P/L"]}</td>
                    </tr>
                `).join('');
                document.getElementById('audit-table').innerHTML = tableHtml;

            } catch (e) { console.error(e); }
        }

        function renderCharts() {
            if (performanceChart) return;
            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            const wins = window.auditData.filter(t => !t["Current P/L"].startsWith('-')).length;
            const losses = window.auditData.length - wins;

            performanceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Profitable', 'Negative'],
                    datasets: [{
                        data: [wins, losses],
                        backgroundColor: ['#22c55e', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: {
                        legend: { labels: { color: '#f8fafc' } },
                        title: { display: true, text: 'Win/Loss Ratio', color: '#f8fafc' }
                    }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
